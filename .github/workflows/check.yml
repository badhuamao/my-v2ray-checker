name: Daily Node Check

on:
  schedule:
    # 每 6 小时自动运行一次
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Node Checker
        run: python main.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add top_asia_nodes.txt
          # 检查是否有变化，有变化才提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update nodes: $(date)" && git push)
