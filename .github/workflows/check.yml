name: 🐻 狗熊工厂 4.5 每日精选

on:
  schedule:
    - cron: '0 20 * * *' # 每天北京时间凌晨 4 点运行一次
  workflow_dispatch:   # 允许随时手动触发

permissions: write-all

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Factory
        run: |
          pip install requests
          python main.py

      - name: Push Results
        uses: EndBug/add-and-commit@v9
        with:
          add: top_asia_nodes.txt
          # 模仿你之前的提交格式
          message: "🐻 狗熊节点自动更新: $(date +'%Y-%m-%d %H:%M')"
