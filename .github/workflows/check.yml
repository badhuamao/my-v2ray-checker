name: 🐻 狗熊工厂 4.6 每日精选

on:
  schedule:
    - cron: '0 20 * * *' # 北京时间凌晨 4 点
  workflow_dispatch:

permissions: write-all

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Factory
        run: |
          pip install requests
          python main.py

      - name: Push Results
        uses: EndBug/add-and-commit@v9
        with:
          add: "top_asia_nodes.txt urls.txt"
          message: "🚀 狗熊精炼完成: $(date +'%Y-%m-%d %H:%M')"
