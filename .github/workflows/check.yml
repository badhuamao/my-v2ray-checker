name: Daily Node Check

on:
  schedule:
    # 每 6 小时运行一次 (UTC 0, 6, 12, 18 点)
    # 对应北京时间 8:00, 14:00, 20:00, 02:00
    - cron: '0 */6 * * *'
  workflow_dispatch: # 保留手动触发按钮

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Script
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add top_asia_nodes.txt
          git commit -m "Update top 30 nodes" || exit 0
          git push
