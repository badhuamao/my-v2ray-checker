name: 狗熊工厂精炼 · 独立版

on:
  schedule:
    # 每天北京时间 00:00, 06:00, 12:00, 18:00 自动运行
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # 随时手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: pip install requests

      - name: 执行狗熊精炼脚本
        run: python main.py

      - name: 提交并推送
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add top_asia_nodes.txt
          git commit -m "🐻 狗熊精炼完成 (独立运行): $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
