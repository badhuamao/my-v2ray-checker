name: Bear Node Auto Fetch

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies & Sing-box
        run: |
          python -m pip install --upgrade pip
          pip install requests
          # 预装 sing-box，为后续深层探测做准备
          sudo bash <(curl -L https://raw.githubusercontent.com/SagerNet/sing-box/main/install.sh)

      - name: Run Multi-threaded Bear Script
        run: python main.py

      - name: Commit and Push Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add top_asia_nodes.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "🐻 狗熊节点自动精筛更新: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
